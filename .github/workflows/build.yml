name: Build

on:
  push:
    branches: ["*"]
    tags: ["*"]
  pull_request:

env:
  SYMGEN_VERSION: v1.2.4

jobs:
  build:
    name: Build ${{matrix.platform}}
    runs-on: ${{matrix.runner}}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            runner: ubuntu-latest
          - platform: linux-aarch64
            runner: ubuntu-24.04-arm
          - platform: macos-arm64
            runner: macos-latest
          - platform: macos-x86_64
            runner: macos-latest
            cmake_args: -DCMAKE_OSX_ARCHITECTURES=x86_64
          - platform: windows-amd64
            runner: windows-latest
            msvc_arch: amd64
          - platform: windows-arm64
            runner: windows-latest
            msvc_arch: amd64_arm64

    steps:
      - uses: actions/checkout@v7

      - name: Read pinned Dusklight version
        id: dusklight
        shell: bash
        run: echo "version=$(sed -n 's/.*set(DUSKLIGHT_VERSION "\([^"]*\)").*/\1/p' CMakeLists.txt)" >> "$GITHUB_OUTPUT"

      - name: Cache Dusklight sources
        uses: actions/cache@v6
        with:
          path: dusklight
          key: dusklight-${{runner.os}}-${{steps.dusklight.outputs.version}}

      - name: Enable Visual Studio environment
        if: matrix.msvc_arch
        uses: step-security/msvc-dev-cmd@v1
        with:
          arch: ${{matrix.msvc_arch}}

      - name: Install ninja
        if: matrix.msvc_arch
        run: choco install ninja

      - name: Configure CMake
        shell: bash
        run: |
          args=(-G Ninja ${{matrix.cmake_args}})
          cmake -B build "${args[@]}"

      - name: Build
        run: cmake --build build --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: dusklight-assets-${{matrix.platform}}
          path: build/dusklight-assets
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: artifacts

      - name: Zip per-platform archives
        shell: bash
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            platform=$(basename "$dir")
            (cd "$dir" && zip -r "../../release/${platform}.zip" .)
          done

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{github.token}}
        run: gh release create "$GITHUB_REF_NAME" release/*.zip --verify-tag --generate-notes

