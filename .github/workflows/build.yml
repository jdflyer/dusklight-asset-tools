name: Build

on:
  push:
    branches: ["*"]
    tags: ["*"]
  pull_request:

env:
  SYMGEN_VERSION: v1.2.4

jobs:
  build:
    name: Build ${{matrix.platform}}
    runs-on: ${{matrix.runner}}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            runner: ubuntu-latest
          - platform: linux-aarch64
            runner: ubuntu-24.04-arm
          - platform: macos-arm64
            runner: macos-latest
          - platform: macos-x86_64
            runner: macos-latest
            cmake_args: -DCMAKE_OSX_ARCHITECTURES=x86_64
          - platform: windows-amd64
            runner: windows-latest
            msvc_arch: amd64
          - platform: windows-arm64
            runner: windows-latest
            msvc_arch: amd64_arm64
          - platform: android-aarch64
            runner: ubuntu-latest
            android_ndk: "29.0.14206865"

    steps:
      - uses: actions/checkout@v6

      - name: Read pinned Dusklight version
        id: dusklight
        shell: bash
        run: echo "version=$(sed -n 's/.*set(DUSKLIGHT_VERSION "\([^"]*\)").*/\1/p' CMakeLists.txt)" >> "$GITHUB_OUTPUT"

      - name: Cache Dusklight sources
        uses: actions/cache@v4
        with:
          path: dusklight
          key: dusklight-${{runner.os}}-${{steps.dusklight.outputs.version}}

      - name: Enable Visual Studio environment
        if: matrix.msvc_arch
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{matrix.msvc_arch}}

      - name: Install ninja
        if: matrix.msvc_arch
        run: choco install ninja

      - name: Install Android NDK
        if: matrix.android_ndk
        uses: android-actions/setup-android@v4
        with:
          packages: ndk;${{matrix.android_ndk}}

      - name: Configure CMake
        shell: bash
        run: |
          args=(${{matrix.cmake_args}})
          if [[ -n "${{matrix.msvc_arch}}" ]]; then
            args+=(-G Ninja)
          fi
          if [[ -n "${{matrix.android_ndk}}" ]]; then
            args+=(-DCMAKE_TOOLCHAIN_FILE="$ANDROID_HOME/ndk/${{matrix.android_ndk}}/build/cmake/android.toolchain.cmake"
                   -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-28)
          fi
          cmake -B build "${args[@]}"

      - name: Build
        run: cmake --build build --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: mod-${{matrix.platform}}
          path: build/mods/*.dusk
          if-no-files-found: error

  combine:
    name: Combine bundles
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download platform bundles
        uses: actions/download-artifact@v7
        with:
          pattern: mod-*
          path: dist

      - name: Install symgen
        run: |
          curl -fsSL -o symgen \
            "https://github.com/encounter/symgen/releases/download/${SYMGEN_VERSION}/symgen-linux-x86_64"
          chmod +x symgen

      - name: Merge bundles
        run: |
          name=$(basename dist/mod-linux-x86_64/*.dusk)
          python3 tools/merge_mod.py -o "combined/$name" --symgen ./symgen \
            --expect-platforms linux-x86_64,linux-aarch64,macos-arm64,macos-x86_64,windows-amd64,windows-arm64,android-aarch64 \
            dist/*/*.dusk

      - name: Upload combined bundle
        uses: actions/upload-artifact@v7
        with:
          name: mod-combined
          path: combined/*.dusk
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{github.token}}
        run: gh release create "$GITHUB_REF_NAME" combined/*.dusk --verify-tag --generate-notes
